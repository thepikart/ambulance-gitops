apiVersion: polyfea.github.io/v1alpha1
kind: WebComponent
metadata:
  name: app-ambulance-ufe-content
spec:
  microFrontend: app-ambulance-ufe
  element: app-ambulance-wl-app
  attributes:
    - name: base-path
      value: /app-ambulance-wl/
  displayRules:
    - allOf:
      - context-name: main-content
      - path: "^(\\.?/)?app-ambulance-wl(/.*)?$"